<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro IVA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F3F5;
    --line:#E1E4E8;
    --line-soft:#ECEEF0;
    --input:#FFFFFF;
    --text:#16181B;
    --muted:#686E76;
    --faint:#9CA1A7;
    --amber:#C97C1F;
    --amber-dim:rgba(201,124,31,0.12);
    --favor:#3F7D53;
    --pagar:#B24A36;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:520px; margin:0 auto; padding:20px 18px 60px;}

  header{margin-bottom:18px;}
  .eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin-bottom:4px;}
  h1{font-family:'Space Grotesk',sans-serif; font-size:21px; font-weight:600; margin:0; letter-spacing:-.01em;}

  .month-nav{display:flex; align-items:center; justify-content:space-between; margin:18px 0 14px;}
  .month-nav button{
    background:none; border:none; color:var(--muted);
    width:28px;height:28px; font-size:17px; cursor:pointer;
  }
  .month-label{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; text-transform:capitalize; color:var(--muted);}

  .saldo-panel{
    padding:16px; margin-bottom:14px; background:var(--input); border:1px solid var(--line); border-radius:12px;
  }
  .saldo-top{margin-bottom:2px;}
  .saldo-tag{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint);}
  .saldo-value{font-family:'Space Grotesk',sans-serif; font-size:38px; font-weight:600; line-height:1.15; letter-spacing:-.01em;}
  .saldo-value.favor{color:var(--favor);}
  .saldo-value.pagar{color:var(--pagar);}

  .gauge{position:relative; height:3px; border-radius:2px; background:var(--line); overflow:hidden; margin:14px 0 8px;}
  .gauge-fill{position:absolute; top:0; bottom:0; border-radius:2px; transition:width .3s ease; background:var(--muted);}
  .gauge-mid{display:none;}
  .gauge-labels{display:flex; justify-content:space-between; font-size:11px; color:var(--muted);}

  .subrow{display:flex; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--line-soft); font-size:12.5px;}
  .subrow div{color:var(--muted);}
  .subrow span{color:var(--text); font-weight:500;}

  .add-toggle{
    width:100%; padding:13px; border-radius:8px; border:1px solid var(--line);
    background:transparent; color:var(--amber); font-family:'IBM Plex Mono',monospace;
    font-size:13px; cursor:pointer; margin-bottom:16px;
  }
  .form-panel{
    padding:0 0 8px; margin-bottom:16px; display:none;
  }
  .form-panel.open{
    display:block; background:var(--input); border:1px solid var(--line); border-radius:12px; padding:16px;
  }
  .tipo-toggle{display:flex; gap:6px; margin-bottom:16px;}
  .tipo-toggle button{
    flex:1; padding:9px; border-radius:7px; border:1px solid var(--line);
    background:transparent; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12.5px; cursor:pointer;
  }
  .tipo-toggle button.active{background:var(--amber-dim); color:var(--amber); border-color:var(--amber);}

  /* Upload area */
  .upload-area{
    border:1px dashed var(--line); border-radius:8px; padding:16px; text-align:center;
    margin-bottom:16px; cursor:pointer; transition:border-color .2s;
  }
  .upload-area:hover{border-color:var(--amber);}
  .upload-area .icon{font-size:20px; margin-bottom:6px; opacity:.7;}
  .upload-area .label{font-size:12.5px; color:var(--muted);}
  .upload-thumb{display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:16px;}
  .upload-thumb img{width:44px;height:44px;object-fit:cover;border-radius:5px;}
  .upload-thumb .status{font-size:12.5px; flex:1;}
  .upload-thumb .status.analyzing{color:var(--amber);}
  .upload-thumb .status.done{color:var(--favor);}
  .upload-thumb .status.error{color:var(--pagar);}
  .upload-thumb button{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;}
  .spinner{display:inline-block; width:12px;height:12px; border:2px solid rgba(232,163,61,.3); border-top-color:var(--amber); border-radius:50%; animation:spin .7s linear infinite; margin-right:6px; vertical-align:-2px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .divider-or{text-align:center; font-size:11px; color:var(--faint); margin:12px 0; letter-spacing:.08em; text-transform:uppercase;}

  .field{margin-bottom:12px;}
  .field label{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); margin-bottom:5px; letter-spacing:.03em;}
  .field label .doubt-flag{color:var(--amber); font-size:10.5px;}
  .field input, .field select{
    width:100%; padding:10px 0; border-radius:0; border:none; border-bottom:1px solid var(--line);
    background:transparent; color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:14px;
  }
  .field input:focus, .field select:focus{outline:none; border-bottom-color:var(--amber);}
  .field.doubt input, .field.doubt select{border-bottom-color:var(--amber);}
  .row2{display:flex; gap:16px;}
  .row2 .field{flex:1;}

  .save-btn{
    width:100%; padding:13px; border-radius:8px; border:none;
    background:var(--amber); color:#17191A; font-weight:600; font-family:'Space Grotesk',sans-serif;
    font-size:14px; cursor:pointer; margin-top:6px;
  }
  .save-btn:disabled{opacity:.6;}
  .cancel-btn{
    width:100%; padding:10px; border-radius:8px; border:1px solid var(--line);
    background:transparent; color:var(--muted); font-family:'IBM Plex Mono',monospace;
    font-size:12.5px; cursor:pointer; margin-top:8px;
  }
  .link-btn{
    background:none; border:none; color:var(--amber); font-family:'IBM Plex Mono',monospace;
    font-size:12px; cursor:pointer; padding:4px 0; text-decoration:underline; text-underline-offset:3px;
  }

  .section-title{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin:22px 0 6px;}
  .entry{
    border-bottom:1px solid var(--line-soft);
    padding:12px 0; margin-bottom:0; display:flex; justify-content:space-between; align-items:center;
    gap:10px;
  }
  .entry-left{display:flex; align-items:center; gap:10px; min-width:0;}
  .tipo-dot{width:5px;height:5px;border-radius:50%; flex-shrink:0; background:var(--muted);}
  .tipo-dot.venta{background:var(--favor);}
  .tipo-dot.compra{background:var(--pagar);}
  .entry-info{min-width:0;}
  .entry-name{font-size:13.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .entry-meta{font-size:11px; color:var(--muted); margin-top:2px;}
  .doubt-dot{display:inline-block; width:6px;height:6px;border-radius:50%; background:var(--amber); margin-left:6px;}
  .entry-right{text-align:right; flex-shrink:0; display:flex; align-items:center;}
  .entry-amount{font-size:14px; font-weight:600;}
  .entry-del{background:none; border:none; color:var(--faint); font-size:16px; cursor:pointer; padding:2px 4px; margin-left:6px;}

  .empty{text-align:center; padding:30px 10px; color:var(--muted); font-size:13px;}
  ::placeholder{color:var(--faint);}

  .view-tabs{display:flex; gap:0; margin:18px 0; border-bottom:1px solid var(--line);}
  .view-tabs button{
    flex:1; padding:10px; border:none; border-bottom:2px solid transparent; margin-bottom:-1px;
    background:transparent; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12.5px; cursor:pointer;
  }
  .view-tabs button.active{color:var(--amber); border-bottom-color:var(--amber);}

  .checkbox-row{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin:14px 0; cursor:pointer;}
  .checkbox-row input{width:auto; accent-color:var(--amber);}

  .year-nav{display:flex; align-items:center; justify-content:space-between; margin:0 0 14px;}
  .year-nav button{
    background:none; border:none; color:var(--muted);
    width:28px;height:28px; font-size:17px; cursor:pointer;
  }
  .year-label{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px;}

  .dash-card{padding:16px; margin-bottom:12px; background:var(--input); border:1px solid var(--line); border-radius:12px;}
  .dash-card-title{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin-bottom:14px;}

  .bar-chart{display:flex; align-items:flex-end; gap:6px; height:120px; margin-bottom:6px;}
  .bar-col{flex:1; display:flex; flex-direction:column-reverse; align-items:center; height:100%; gap:1px;}
  .bar-fill{width:100%; border-radius:2px 2px 0 0; min-height:2px;}
  .bar-fill.venta{background:var(--favor);}
  .bar-fill.compra{background:var(--pagar);}
  .bar-labels{display:flex; gap:6px;}
  .bar-labels span{flex:1; text-align:center; font-size:9px; color:var(--muted); text-transform:capitalize;}

  .rank-row{margin-bottom:12px;}
  .rank-top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
  .rank-top .cat{color:var(--text);}
  .rank-top .amt{color:var(--muted);}
  .rank-track{height:2px; background:var(--line); border-radius:2px; overflow:hidden;}
  .rank-fill{height:100%; background:var(--amber); border-radius:2px;}

  .pend-banner{
    display:flex; flex-direction:column; gap:8px;
    background:var(--amber-dim); border:1px solid var(--amber); border-radius:10px;
    padding:12px 14px; margin-bottom:14px; font-size:12.5px; cursor:pointer;
  }
  .pend-banner-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .pend-item{display:flex; justify-content:space-between; align-items:center; background:var(--input); border-radius:7px; padding:7px 9px; font-size:11.5px;}

  .segctrl{display:flex; background:var(--input); border:1px solid var(--line); border-radius:10px; padding:3px; margin-bottom:14px;}
  .segctrl button{flex:1; border:none; background:none; padding:9px; border-radius:7px; font-size:12.5px; color:var(--muted); cursor:pointer; font-family:'IBM Plex Mono',monospace;}
  .segctrl button.active{background:var(--amber-dim); color:var(--amber); font-weight:600;}

  .month-summary{background:var(--input); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px;}
  .dash-section-label{font-size:11px; font-weight:600; color:var(--text); margin:4px 0 8px; letter-spacing:.02em;}

  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .stat-card{background:var(--bg); border:1px solid var(--line); border-left:3px solid var(--amber); border-radius:10px; padding:11px 12px;}
  .stat-card .k-label{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;}
  .stat-num{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; margin-top:4px;}
  .stat-num.favor{color:var(--favor);} .stat-num.pagar{color:var(--pagar);}

  .tilde-row{display:flex; align-items:flex-start; gap:9px; border:1px solid var(--amber); background:var(--amber-dim); border-radius:10px; padding:11px 12px; margin:12px 0; font-size:11px; color:var(--muted); cursor:pointer;}
  .tilde-row input{margin-top:2px; width:auto; accent-color:var(--amber);}
  .tilde-row b{color:var(--text); font-size:12px;}
  .tilde-chip{border:1px solid var(--line); background:var(--input); border-radius:20px; padding:2px 8px; font-size:9.5px; cursor:pointer; color:var(--muted); white-space:nowrap; margin-top:4px;}
  .tilde-chip.on{background:var(--amber-dim); color:var(--amber); border-color:var(--amber);}

  .dash-trend-title{font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); font-weight:600; margin-bottom:10px;}

</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="fileInput" accept="image/*,application/pdf,.pdf" style="display:none;">

<script>
const MONTH_NAMES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const ALICUOTAS = [21, 10.5, 27, 0];
const TIPOS_COMPROBANTE = ['A','B','C','NC','SF'];
const TIPO_COMPROBANTE_LABEL = {A:'Factura A', B:'Factura B', C:'Factura C', NC:'Nota de crédito', SF:'Sin factura'};
const CATEGORIAS = {
  venta: ['Asesoramiento','Control de plagas','Extracción de petróleo y gas','Otro'],
  compra: ['Casa','Alimento e higiene','Transporte','Bienestar','Educación','Impuestos','Otro']
};
const emptyDraft = () => ({
  fecha: new Date().toISOString().slice(0,10),
  contraparte:'', cuit:'', numeroComprobante:'', tipoComprobante:'A',
  netos: {21:{neto:'',iva:''}, '10.5':{neto:'',iva:''}, 27:{neto:'',iva:''}, 0:{neto:'',iva:''}},
  alicuotaSimple: 21, detalleAbierto: false,
  percepcionIVA:'', percepcionIIBB:'', otrosTributos:'', total:'',
  categoria:'', computaIVA:true, dudosos:[]
});
function ivaDeRenglon(rate, r){
  const neto = parseFloat(r && r.neto) || 0;
  const ivaLeido = parseFloat(r && r.iva) || 0;
  // Si la IA (o el usuario) cargó el IVA impreso, se usa ese; si no, se calcula.
  return ivaLeido > 0 ? ivaLeido : Math.round(neto * parseFloat(rate)) / 100;
}
function netosActivos(netos){
  return Object.entries(netos||{}).filter(([,r]) => (parseFloat(r && r.neto)||0) > 0);
}
function netosTotal(netos){
  return Object.values(netos||{}).reduce((s,r) => s + (parseFloat(r && r.neto)||0), 0);
}
function netosIVA(netos){
  return Object.entries(netos||{}).reduce((s,[rate,r]) => s + ivaDeRenglon(rate, r), 0);
}

let state = {
  user: null,
  authChecking: true,
  authError: '',
  monthKey: currentMonthKey(),
  entries: [],
  formOpen: false,
  tipo: 'compra', // por defecto: es el uso más frecuente
  loading: true,
  draft: emptyDraft(),
  view: 'mes', // 'mes' | 'dashboard'
  dashYear: new Date().getFullYear(),
  dashLens: 'arca', // 'arca' | 'personal'
  dashLoading: false,
  allMonths: {},
  upload: null // {thumb, status: 'analyzing'|'done'|'error', errorMsg}
};

function currentMonthKey(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0');
}
function shiftMonth(key, delta){
  const [y,m] = key.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0');
}
function fmtMoney(n){
  return '$' + n.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

const CATEGORY_COLORS = ['#C97C1F', '#5B7C99', '#8B6B8F', '#8A7A6B', '#5E8A82', '#B08D57', '#A0596B'];

function drawCharts(){
  if(!window.__chartData) return;
  const pieHost = document.getElementById('pieCanvas');
  if(pieHost && window.__chartData.pie) pieHost.outerHTML = svgDonut(window.__chartData.pie);
  const barHost = document.getElementById('barCanvas');
  if(barHost && window.__chartData.bar) barHost.outerHTML = svgGroupedBars(window.__chartData.bar);
}

function svgDonut(d){
  const total = d.data.reduce((s,v)=>s+v,0) || 1;
  const R = 46, CX = 55, CY = 55, STROKE = 16;
  const CIRC = 2 * Math.PI * R;
  let acc = 0;
  const segs = d.data.map((v,i) => {
    const frac = v/total;
    const dash = frac * CIRC;
    const gap = CIRC - dash;
    const offset = -acc * CIRC;
    acc += frac;
    return `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${d.colors[i]}" stroke-width="${STROKE}"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${offset}" transform="rotate(-90 ${CX} ${CY})">
      <title>${d.labels[i]}: ${fmtMoney(d.data[i])}</title>
    </circle>`;
  }).join('');
  return `<svg id="pieCanvas" viewBox="0 0 110 110" width="100%" height="100%">${segs}</svg>`;
}

function svgGroupedBars(d){
  const W = 320, H = 150, PAD_B = 18, PAD_T = 4;
  const maxVal = Math.max(1, ...d.venta, ...d.compra);
  const n = d.labels.length;
  const colW = W / n;
  const barW = Math.min(7, colW * 0.32);
  const usableH = H - PAD_B - PAD_T;
  let bars = '';
  for(let i=0;i<n;i++){
    const x0 = i*colW + colW/2;
    const hV = (d.venta[i]/maxVal) * usableH;
    const hC = (d.compra[i]/maxVal) * usableH;
    const yV = H - PAD_B - hV;
    const yC = H - PAD_B - hC;
    bars += `<rect x="${x0-barW-1}" y="${yV}" width="${barW}" height="${Math.max(hV,1)}" rx="2" fill="#3F7D53"><title>${d.labels[i]} · ${d.labelVenta}: ${fmtMoney(d.venta[i])}</title></rect>`;
    bars += `<rect x="${x0+1}" y="${yC}" width="${barW}" height="${Math.max(hC,1)}" rx="2" fill="#B24A36"><title>${d.labels[i]} · ${d.labelCompra}: ${fmtMoney(d.compra[i])}</title></rect>`;
    bars += `<text x="${x0}" y="${H-4}" font-size="7.5" fill="#9CA1A7" text-anchor="middle" font-family="IBM Plex Mono, monospace">${d.labels[i]}</text>`;
  }
  bars += `<line x1="0" y1="${H-PAD_B}" x2="${W}" y2="${H-PAD_B}" stroke="#E1E4E8" stroke-width="1"/>`;
  return `
    <svg id="barCanvas" viewBox="0 0 ${W} ${H}" width="100%" height="100%">${bars}</svg>
    <div class="gauge-labels" style="margin-top:6px;">
      <span><span style="color:#3F7D53;">●</span> ${d.labelVenta}</span>
      <span><span style="color:#B24A36;">●</span> ${d.labelCompra}</span>
    </div>
  `;
}

async function apiFetch(url, options){
  const res = await fetch(url, options);
  if(res.status === 401){
    state.user = null;
    state.authError = '';
    render();
    throw new Error('sesión vencida');
  }
  return res;
}

async function loadMonth(key){
  state.loading = true;
  render();
  try{
    const res = await apiFetch('/api/entries?month=' + encodeURIComponent(key));
    const data = await res.json();
    state.entries = Array.isArray(data.entries) ? data.entries : [];
  }catch(e){
    if(e.message !== 'sesión vencida'){ console.error(e); state.entries = []; }
    return;
  }
  state.loading = false;
  render();
}
async function saveMonth(){
  try{
    await apiFetch('/api/entries', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ month: state.monthKey, entries: state.entries })
    });
  }catch(e){ if(e.message !== 'sesión vencida') console.error('Error guardando', e); }
}
function calcTotals(entries){
  let debito = 0, credito = 0, percepcionesIIBB = 0, percepcionesIVA = 0, otrosTributos = 0;
  entries.forEach(e => {
    const sign = e.tipoComprobante === 'NC' ? -1 : 1;
    const computa = e.computaIVA !== false; // por defecto true si no está definido
    if(computa){
      if(e.tipo === 'venta') debito += sign * e.iva;
      else credito += sign * e.iva;
      percepcionesIVA += sign * (e.percepcionIVA || 0);
    }
    percepcionesIIBB += sign * (e.percepcionIIBB || 0);
    otrosTributos += sign * (e.otrosTributos || 0);
  });
  // Percepciones de IVA sufridas como comprador se computan como pago a cuenta del IVA
  return {debito, credito, percepcionesIVA, percepcionesIIBB, otrosTributos, saldo: debito - credito - percepcionesIVA};
}

function montoFlujo(e){
  // Monto total del movimiento para el flujo de fondos por unidad (más allá de lo fiscal)
  const sign = e.tipoComprobante === 'NC' ? -1 : 1;
  return sign * (e.total || (e.neto + e.iva + (e.percepcionIVA||0) + (e.percepcionIIBB||0) + (e.otrosTributos||0)));
}

async function loadAllMonths(){
  try{
    const res = await apiFetch('/api/entries?all=1');
    const data = await res.json();
    return data.months || {};
  }catch(e){
    if(e.message !== 'sesión vencida') console.error(e);
    return {};
  }
}

async function loadDashboard(){
  state.dashLoading = true;
  render();
  state.allMonths = await loadAllMonths();
  state.dashLoading = false;
  render();
}

function scanCleanup(ctx, width, height){
  const imgData = ctx.getImageData(0, 0, width, height);
  const d = imgData.data;
  const n = width * height;
  const gray = new Uint8ClampedArray(n);
  let min = 255, max = 0;
  for(let i=0, p=0; i<d.length; i+=4, p++){
    const g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    gray[p] = g;
    if(g < min) min = g;
    if(g > max) max = g;
  }
  const range = Math.max(1, max - min);
  for(let i=0, p=0; i<d.length; i+=4, p++){
    let v = ((gray[p] - min) / range) * 255; // estira el contraste a todo el rango
    v = ((v/255 - 0.5) * 1.4 + 0.5) * 255; // curva extra: acentúa texto contra el fondo
    v = v > 210 ? 255 : v * (255/210); // aplana los blancos: "quita" el fondo, deja el papel limpio
    v = Math.max(0, Math.min(255, v));
    d[i] = d[i+1] = d[i+2] = v;
  }
  ctx.putImageData(imgData, 0, 0);
}

function resizeImage(file, maxDim = 900, quality = 0.7){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('No se pudo procesar la imagen'));
      img.onload = () => {
        let {width, height} = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        try{
          scanCleanup(ctx, width, height); // blanco y negro prolijo, tipo app de escaneo
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        }catch(e){
          reject(new Error('No se pudo comprimir la imagen'));
        }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

async function attachPhoto(file){
  try{
    const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    const thumb = isPdf ? 'PDF' : await resizeImage(file);
    state.upload = {thumb, isPdf, status: 'analyzing'};
    state.formOpen = true;
    render();

    const base64 = await fileToBase64(file);
    const mediaType = isPdf ? 'application/pdf' : (file.type || 'image/jpeg');
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ imageBase64: base64, mediaType, isPdf })
    });
    const parsed = await response.json();

    if(!response.ok || parsed.error){
      throw new Error(parsed.error || 'No se pudo leer el comprobante');
    }

    state.tipo = parsed.tipo === 'compra' ? 'compra' : 'venta';
    const catValida = CATEGORIAS[state.tipo].includes(parsed.categoria) ? parsed.categoria : '';
    const netos = {21:{neto:'',iva:''}, '10.5':{neto:'',iva:''}, 27:{neto:'',iva:''}, 0:{neto:'',iva:''}};
    if(parsed.netos && typeof parsed.netos === 'object'){
      [21, '10.5', 27, 0].forEach(rate => {
        const v = parsed.netos[rate];
        if(v && typeof v === 'object'){
          if(v.neto) netos[rate] = { neto: v.neto, iva: v.iva ?? '' };
        } else if(v){
          netos[rate] = { neto: v, iva: '' }; // formato viejo: solo número, sin IVA leído
        }
      });
    } else if(Array.isArray(parsed.renglones)){
      parsed.renglones.forEach(r => { if(ALICUOTAS.includes(r.alicuota) && r.neto) netos[r.alicuota] = { neto: r.neto, iva: '' }; });
    } else if(parsed.neto){
      const rate = ALICUOTAS.includes(parsed.alicuota) ? parsed.alicuota : 21;
      netos[rate] = { neto: parsed.neto, iva: '' };
    }
    const activos = netosActivos(netos);
    state.draft = {
      fecha: parsed.fecha || emptyDraft().fecha,
      contraparte: parsed.contraparte || '',
      cuit: parsed.cuit || '',
      numeroComprobante: parsed.numeroComprobante || '',
      tipoComprobante: TIPOS_COMPROBANTE.includes(parsed.tipoComprobante) ? parsed.tipoComprobante : 'A',
      netos,
      alicuotaSimple: activos.length ? parseFloat(activos[0][0]) : 21,
      detalleAbierto: activos.length > 1,
      percepcionIVA: parsed.percepcionIVA ?? '',
      percepcionIIBB: parsed.percepcionIIBB ?? '',
      otrosTributos: parsed.otrosTributos ?? '',
      total: parsed.total ?? '',
      categoria: catValida,
      computaIVA: true,
      dudosos: Array.isArray(parsed.dudosos) ? parsed.dudosos : []
    };
    state.upload.status = 'done';
  }catch(e){
    console.error(e);
    if(state.upload) state.upload.status = 'error';
    state.uploadError = e.message || 'No se pudo leer el comprobante. Completá los campos a mano.';
  }
  render();
}

          method: 'POST',

          body: JSON.stringify({ username, password })
        });

        if(!res.ok){ state.authError = data.error || 'No se pudo iniciar sesión'; render(); return; }
        state.user = data.username;

  app.innerHTML = `

  document.getElementById('tabDashboard').onclick = () => {
    state.view = 'dashboard';
    render();
    loadDashboard();

function renderDashboardHTML(){
  if(state.dashLoading){
    return '<div class="empty">Cargando resumen...</div>';
  }
  const allMonths = state.allMonths || {};
  const year = state.dashYear;
  const lens = state.dashLens;
  const monthKeysOfYear = MONTH_NAMES.map((_,i) => year + '-' + String(i+1).padStart(2,'0'));
  const entriesOfYear = monthKeysOfYear.flatMap(k => allMonths[k] || []);
  const entriesLens = lens === 'arca' ? entriesOfYear.filter(e => e.computaIVA !== false) : entriesOfYear;

  const t = calcTotals(entriesOfYear); // calcTotals ya respeta el tilde internamente, siempre
  const isFavor = t.saldo <= 0;

  function sumaIG(entries){
    let facturado=0, gastado=0;
    entries.forEach(e => { const m = montoFlujo(e); if(e.tipo==='venta') facturado += m; else gastado += m; });
    return {facturado, gastado};
  }
  const ig = sumaIG(entriesLens);

  // Serie mensual, respetando la pestaña activa
  const monthly = monthKeysOfYear.map(k => {
    const es = (allMonths[k] || []).filter(e => lens==='arca' ? e.computaIVA !== false : true);
    let venta = 0, compra = 0;
    es.forEach(e => { const m = montoFlujo(e); if(e.tipo === 'venta') venta += m; else compra += m; });
    return {venta, compra};
  });

  // Categorías de gasto, respetando la pestaña activa
  const porCategoria = {};
  entriesLens.filter(e => e.tipo === 'compra').forEach(e => {
    const cat = e.categoria || 'Sin categoría';
    porCategoria[cat] = (porCategoria[cat] || 0) + montoFlujo(e);
  });
  const gastoOrdenado = Object.entries(porCategoria).map(([cat,monto]) => ({cat,monto})).sort((a,b) => b.monto-a.monto);
  const totalGasto = gastoOrdenado.reduce((s,c) => s+c.monto, 0);

  // Pendientes: comprobantes dudosos en todo el histórico
  const pendientes = Object.values(allMonths).flat().filter(e => e.dudoso).length;

  window.__chartData = {
    pie: gastoOrdenado.length ? { labels: gastoOrdenado.map(c=>c.cat), data: gastoOrdenado.map(c=>c.monto), colors: gastoOrdenado.map((c,i)=>CATEGORY_COLORS[i % CATEGORY_COLORS.length]) } : null,
    bar: { labels: MONTH_NAMES.map(n=>n.slice(0,3)), venta: monthly.map(m=>m.venta), compra: monthly.map(m=>m.compra), labelVenta: lens==='arca'?'Facturado':'Ingreso', labelCompra: lens==='arca'?'Recuperado':'Gasto' }
  };

  return `
    <div class="year-nav">
      <button id="prevYear">‹</button>
      <div class="year-label">${year}</div>
      <button id="nextYear">›</button>
    </div>

    <div class="segctrl">
      <button class="${lens==='arca'?'active':''}" id="lensArca">🏛️ ARCA</button>
      <button class="${lens==='personal'?'active':''}" id="lensPersonal">Personal</button>
    </div>

    ${pendientes > 0 ? `
    <div class="pend-banner">
      <div class="pend-banner-top">⚠ Tenés ${pendientes} comprobante${pendientes>1?'s':''} marcado${pendientes>1?'s':''} como dudoso${pendientes>1?'s':''} para revisar</div>
      <button class="link-btn" style="padding:0; align-self:flex-start;" id="pendGoMes">→ Revisar en Mes</button>
    </div>` : ''}

    <div class="month-summary">
      ${lens === 'arca' ? `
        <div class="dash-section-label">📘 Libro IVA (fiscal) · ${year}</div>
        <div class="stat-grid" style="margin-bottom:14px;">
          <div class="stat-card" style="border-left-color:${isFavor?'var(--favor)':'var(--pagar)'};">
            <div class="k-label">${isFavor ? 'A favor' : 'A pagar'}</div>
            <div class="stat-num ${isFavor ? 'favor' : 'pagar'}">${fmtMoney(Math.abs(t.saldo))}</div>
          </div>
          <div class="stat-card"><div class="k-label">Percepciones IIBB</div><div class="stat-num" style="font-size:16px;">${fmtMoney(t.percepcionesIIBB)}</div></div>
        </div>
      ` : ''}

      <div class="dash-section-label">${lens==='arca' ? '💰 Facturado y recuperado' : '💰 Ingreso y gasto'}</div>
      <div class="stat-grid" style="margin-bottom:16px;">
        <div class="stat-card" style="border-left-color:var(--favor);"><div class="k-label">${lens==='arca'?'Facturado':'Ingreso'}</div><div class="stat-num favor">${fmtMoney(ig.facturado)}</div></div>
        <div class="stat-card" style="border-left-color:var(--pagar);"><div class="k-label">${lens==='arca'?'Recuperado':'Gasto'}</div><div class="stat-num pagar">${fmtMoney(ig.gastado)}</div></div>
      </div>

      <div class="dash-section-label">Gastos por categoría · ${year}</div>
      ${gastoOrdenado.length === 0 ? '<div class="empty">Todavía no hay gastos cargados en este año.</div>' : `
      <div style="display:flex; gap:16px; align-items:center;">
        <div style="width:100px; height:100px; flex-shrink:0;"><svg id="pieCanvas"></svg></div>
        <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
          ${gastoOrdenado.map((c,i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; font-size:11px;">
              <span style="display:flex; align-items:center; gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:${CATEGORY_COLORS[i % CATEGORY_COLORS.length]};display:inline-block;"></span>${c.cat}</span>
              <span style="color:var(--muted);">${fmtMoney(c.monto)} · ${Math.round(c.monto/totalGasto*100)}%</span>
            </div>
          `).join('')}
        </div>
      </div>
      `}
    </div>

    <div class="dash-card">
      <div class="dash-trend-title">Evolución mensual de ingresos vs egresos</div>
      <div style="height:170px;"><svg id="barCanvas"></svg></div>
    </div>
  `;
}

function readNetosFromForm(){
  const netos = {...state.draft.netos};
  const detalleInputs = document.querySelectorAll('.f_neto_rate');
  if(detalleInputs.length > 0){
    detalleInputs.forEach(input => {
      const rate = input.dataset.rate;
      const ivaInput = document.querySelector(`.f_iva_rate[data-rate="${rate}"]`);
      netos[rate] = { neto: input.value, iva: ivaInput ? ivaInput.value : '' };
    });
    return { netos, alicuotaSimple: state.draft.alicuotaSimple };
  }
  const simpleInput = document.getElementById('f_neto_simple');
  const simpleSel = document.getElementById('f_alicuotaSimple');
  if(simpleInput){
    const rate = simpleSel ? parseFloat(simpleSel.value) : state.draft.alicuotaSimple;
    // vista simple asume un solo renglón activo: limpiamos los demás casilleros
    const cleared = {21:{neto:'',iva:''}, '10.5':{neto:'',iva:''}, 27:{neto:'',iva:''}, 0:{neto:'',iva:''}};
    cleared[rate] = { neto: simpleInput.value, iva: '' }; // IVA se calcula solo en la vista simple
    return { netos: cleared, alicuotaSimple: rate };
  }
  return { netos, alicuotaSimple: state.draft.alicuotaSimple };
}

function readDraftFromForm(){
  const val = (id, fallback='') => { const el = document.getElementById(id); return el ? el.value : fallback; };
  const sf = val('f_tipoComprobante') === 'SF';
  let netos, alicuotaSimple;
  if(sf){
    netos = {21:{neto:'',iva:''}, '10.5':{neto:'',iva:''}, 27:{neto:'',iva:''}, 0:{neto:'',iva:''}};
    netos[state.draft.alicuotaSimple || 21] = { neto: val('f_neto_sf'), iva: '' };
    alicuotaSimple = state.draft.alicuotaSimple || 21;
  } else {
    const r = readNetosFromForm();
    netos = r.netos; alicuotaSimple = r.alicuotaSimple;
  }
  state.draft = {
    fecha: val('f_fecha'),
    contraparte: val('f_contraparte'),
    cuit: sf ? '' : val('f_cuit'),
    numeroComprobante: sf ? '' : val('f_numeroComprobante'),
    tipoComprobante: val('f_tipoComprobante', 'A'),
    netos, alicuotaSimple,
    detalleAbierto: state.draft.detalleAbierto,
    percepcionIVA: sf ? '' : val('f_percepcionIVA'),
    percepcionIIBB: sf ? '' : val('f_percepcionIIBB'),
    otrosTributos: sf ? '' : val('f_otrosTributos'),
    total: sf ? '' : val('f_total'),
    categoria: val('f_categoria'),
    computaIVA: sf ? false : (document.getElementById('f_computaIVA') ? document.getElementById('f_computaIVA').checked : true),
    dudosos: state.draft.dudosos
  };
}

function attachDashboardEvents(){
  const prevYear = document.getElementById('prevYear');
  const nextYear = document.getElementById('nextYear');
  if(prevYear) prevYear.onclick = () => { state.dashYear--; render(); };
  if(nextYear) nextYear.onclick = () => { state.dashYear++; render(); };

  const lensArca = document.getElementById('lensArca');
  const lensPersonal = document.getElementById('lensPersonal');
  if(lensArca) lensArca.onclick = () => { state.dashLens = 'arca'; render(); };
  if(lensPersonal) lensPersonal.onclick = () => { state.dashLens = 'personal'; render(); };

  const pendGoMes = document.getElementById('pendGoMes');
  if(pendGoMes) pendGoMes.onclick = () => { state.view = 'mes'; render(); };
}

function exportarExcel(){
  const headers = ['Fecha','Tipo','Contraparte','Categoría','Neto','IVA','Total','Computa ARCA'];
  const filas = state.entries.map(e => [
    e.fecha,
    e.tipo === 'venta' ? 'Venta' : 'Compra',
    e.contraparte,
    e.categoria || '',
    e.neto.toFixed(2),
    e.iva.toFixed(2),
    (e.neto + e.iva).toFixed(2),
    e.computaIVA !== false ? 'Sí' : 'No'
  ]);
  const csvEscape = (v) => /[",;\n]/.test(v) ? '"' + String(v).replace(/"/g,'""') + '"' : v;
  const csv = [headers, ...filas].map(row => row.map(csvEscape).join(';')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'libro-iva-' + state.monthKey + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function attachMesEvents(){
  document.getElementById('prevMonth').onclick = () => { state.monthKey = shiftMonth(state.monthKey, -1); loadMonth(state.monthKey); };
  document.getElementById('nextMonth').onclick = () => { state.monthKey = shiftMonth(state.monthKey, 1); loadMonth(state.monthKey); };

  const exportBtn = document.getElementById('exportCsv');
  if(exportBtn) exportBtn.onclick = exportarExcel;

  document.getElementById('toggleForm').onclick = () => {
    state.formOpen = !state.formOpen;
    if(!state.formOpen){ state.upload = null; state.draft = emptyDraft(); }
    render();
  };

  const cancelBtn = document.getElementById('cancelEntry');
  if(cancelBtn) cancelBtn.onclick = () => { state.formOpen = false; state.upload = null; state.draft = emptyDraft(); render(); };

  document.querySelectorAll('.tipo-toggle button').forEach(btn => {
    btn.onclick = () => {
      if(document.getElementById('f_fecha')) readDraftFromForm();
      state.tipo = btn.dataset.tipo;
      if(!CATEGORIAS[state.tipo].includes(state.draft.categoria)) state.draft.categoria = '';
      state.formOpen = true;
      render();
    };
  });

  const uploadArea = document.getElementById('uploadArea');
  if(uploadArea) uploadArea.onclick = () => document.getElementById('fileInput').click();

  const tipoComprobanteSel = document.getElementById('f_tipoComprobante');
  if(tipoComprobanteSel) tipoComprobanteSel.addEventListener('change', () => { readDraftFromForm(); render(); });

  const categoriaSel = document.getElementById('f_categoria');
  if(categoriaSel) categoriaSel.addEventListener('change', () => { readDraftFromForm(); render(); });

  ['f_neto_sf','f_neto_simple','f_alicuotaSimple','f_percepcionIVA','f_percepcionIIBB','f_otrosTributos','f_total','f_computaIVA'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('change', () => { readDraftFromForm(); render(); });
  });

  document.querySelectorAll('.f_neto_rate, .f_iva_rate').forEach(el => {
    el.addEventListener('change', () => { readDraftFromForm(); render(); });
  });

  const toggleDetalle = document.getElementById('toggleDetalle');
  if(toggleDetalle) toggleDetalle.onclick = () => {
    readDraftFromForm();
    state.draft.detalleAbierto = !state.draft.detalleAbierto;
    render();
  };

  const retake = document.getElementById('retakePhoto');
  if(retake) retake.onclick = () => { state.upload = null; state.draft = emptyDraft(); render(); };

  const saveBtn = document.getElementById('saveEntry');
  if(saveBtn) saveBtn.onclick = async () => {
    readDraftFromForm();
    const sf = state.draft.tipoComprobante === 'SF';
    const netosLimpios = {};
    Object.entries(state.draft.netos).forEach(([rate, r]) => {
      const n = parseFloat(r && r.neto) || 0;
      if(n > 0) netosLimpios[rate] = { neto: n, iva: sf ? 0 : ivaDeRenglon(rate, r) };
    });
    const activos = Object.entries(netosLimpios);
    const neto = activos.reduce((s,[,r]) => s + r.neto, 0);
    const iva = sf ? 0 : activos.reduce((s,[,r]) => s + r.iva, 0);
    const percepcionIVA = sf ? 0 : (parseFloat(state.draft.percepcionIVA) || 0);
    const percepcionIIBB = sf ? 0 : (parseFloat(state.draft.percepcionIIBB) || 0);
    const otrosTributos = sf ? 0 : (parseFloat(state.draft.otrosTributos) || 0);
    const total = sf ? 0 : (parseFloat(state.draft.total) || 0);
    const contraparte = state.draft.contraparte.trim();
    const fecha = state.draft.fecha;

    if(neto <= 0 || activos.length === 0){ alert(sf ? 'Ingresá el monto.' : 'Ingresá el neto gravado.'); return; }
    if(!state.draft.categoria){ alert('Elegí una categoría.'); return; }

    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      tipo: state.tipo,
      tipoComprobante: state.draft.tipoComprobante,
      numeroComprobante: state.draft.numeroComprobante.trim(),
      cuit: state.draft.cuit.trim(),
      categoria: state.draft.categoria,
      fecha, contraparte,
      netos: sf ? undefined : netosLimpios,
      neto, iva,
      alicuota: activos.length === 1 ? parseFloat(activos[0][0]) : null,
      percepcionIVA, percepcionIIBB, otrosTributos, total,
      computaIVA: sf ? false : state.draft.computaIVA,
      dudoso: state.draft.dudosos.length > 0,
      foto: state.upload ? state.upload.thumb : null,
      cargadoPor: state.user
    };
    state.entries.push(entry);
    saveBtn.disabled = true;
    saveBtn.textContent = 'Guardando...';
    await saveMonth();
    state.formOpen = false;
    state.upload = null;
    state.draft = emptyDraft();
    render();
  };

  document.querySelectorAll('.entry-del').forEach(btn => {
    btn.onclick = async () => {
      state.entries = state.entries.filter(e => e.id !== btn.dataset.id);
      await saveMonth();
      render();
    };
  });

  document.querySelectorAll('[data-toggle-arca]').forEach(btn => {
    btn.onclick = async () => {
      const entry = state.entries.find(e => e.id === btn.dataset.id);
      if(!entry) return;
      entry.computaIVA = entry.computaIVA === false ? true : false;
      await saveMonth();
      render();
    };
  });
}

document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(file) attachPhoto(file);
  e.target.value = '';
});

async function init(){
  try{
    const res = await fetch('/api/me');
    if(res.ok){
      const data = await res.json();
      state.user = data.username;
    }
  }catch(e){ /* sin sesión */ }
  state.authChecking = false;
  render();
  if(state.user) loadMonth(state.monthKey);
}
init();
</script>
