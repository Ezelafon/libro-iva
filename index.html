<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro IVA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B1E20;
    --panel:#232729;
    --panel-2:#292E30;
    --line:#33383A;
    --text:#EDEAE3;
    --muted:#8B9196;
    --amber:#E8A33D;
    --teal:#4FA88F;
    --rust:#D9634B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:520px; margin:0 auto; padding:18px 16px 60px;}

  header{margin-bottom:16px;}
  .eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:4px;}
  h1{font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; margin:0; letter-spacing:-.01em;}

  .month-nav{display:flex; align-items:center; justify-content:space-between; margin:14px 0 10px;}
  .month-nav button{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    width:32px;height:32px;border-radius:6px; font-size:16px; cursor:pointer;
  }
  .month-label{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; text-transform:capitalize;}

  .saldo-panel{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:18px; margin-bottom:14px;
  }
  .saldo-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;}
  .saldo-tag{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);}
  .saldo-value{font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:700;}
  .saldo-value.favor{color:var(--teal);}
  .saldo-value.pagar{color:var(--rust);}

  .gauge{position:relative; height:10px; border-radius:6px; background:var(--panel-2); overflow:hidden; margin-bottom:8px;}
  .gauge-fill{position:absolute; top:0; bottom:0; border-radius:6px; transition:width .3s ease;}
  .gauge-mid{position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--line); left:50%;}
  .gauge-labels{display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted);}

  .subrow{display:flex; justify-content:space-between; margin-top:12px; padding-top:12px; border-top:1px solid var(--line); font-size:12.5px;}
  .subrow div{color:var(--muted);}
  .subrow span{color:var(--text); font-weight:500;}

  .add-toggle{
    width:100%; padding:12px; border-radius:10px; border:1px dashed var(--line);
    background:transparent; color:var(--amber); font-family:'IBM Plex Mono',monospace;
    font-size:13px; cursor:pointer; margin-bottom:14px;
  }
  .form-panel{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:16px; margin-bottom:14px; display:none;
  }
  .form-panel.open{display:block;}
  .tipo-toggle{display:flex; gap:8px; margin-bottom:12px;}
  .tipo-toggle button{
    flex:1; padding:10px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:13px; cursor:pointer;
  }
  .tipo-toggle button.active[data-tipo="venta"]{background:rgba(79,168,143,0.18); color:var(--teal); border-color:var(--teal);}
  .tipo-toggle button.active[data-tipo="compra"]{background:rgba(217,99,75,0.18); color:var(--rust); border-color:var(--rust);}

  /* Upload area */
  .upload-area{
    border:1.5px dashed var(--line); border-radius:10px; padding:16px; text-align:center;
    margin-bottom:14px; cursor:pointer; transition:border-color .2s;
  }
  .upload-area:hover{border-color:var(--amber);}
  .upload-area .icon{font-size:22px; margin-bottom:6px;}
  .upload-area .label{font-size:12.5px; color:var(--muted);}
  .upload-thumb{display:flex; align-items:center; gap:10px; background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:10px; margin-bottom:14px;}
  .upload-thumb img{width:48px;height:48px;object-fit:cover;border-radius:6px;}
  .upload-thumb .status{font-size:12.5px; flex:1;}
  .upload-thumb .status.analyzing{color:var(--amber);}
  .upload-thumb .status.done{color:var(--teal);}
  .upload-thumb .status.error{color:var(--rust);}
  .upload-thumb button{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;}
  .spinner{display:inline-block; width:12px;height:12px; border:2px solid rgba(232,163,61,.3); border-top-color:var(--amber); border-radius:50%; animation:spin .7s linear infinite; margin-right:6px; vertical-align:-2px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .divider-or{text-align:center; font-size:11px; color:var(--muted); margin:10px 0; letter-spacing:.08em; text-transform:uppercase;}

  .field{margin-bottom:10px;}
  .field label{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); margin-bottom:4px; letter-spacing:.03em;}
  .field label .doubt-flag{color:var(--amber); font-size:10.5px;}
  .field input, .field select{
    width:100%; padding:10px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:14px;
  }
  .field.doubt input, .field.doubt select{border-color:var(--amber); background:rgba(232,163,61,0.08);}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}

  .save-btn{
    width:100%; padding:12px; border-radius:8px; border:none;
    background:var(--amber); color:#1B1E20; font-weight:600; font-family:'Space Grotesk',sans-serif;
    font-size:14px; cursor:pointer; margin-top:4px;
  }
  .save-btn:disabled{opacity:.6;}
  .cancel-btn{
    width:100%; padding:10px; border-radius:8px; border:1px solid var(--line);
    background:transparent; color:var(--muted); font-family:'IBM Plex Mono',monospace;
    font-size:12.5px; cursor:pointer; margin-top:8px;
  }

  .section-title{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:18px 0 8px;}
  .entry{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;
    gap:10px;
  }
  .entry-left{display:flex; align-items:center; gap:10px; min-width:0;}
  .tipo-dot{width:8px;height:8px;border-radius:50%; flex-shrink:0;}
  .tipo-dot.venta{background:var(--teal);}
  .tipo-dot.compra{background:var(--rust);}
  .entry-info{min-width:0;}
  .entry-name{font-size:13.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .entry-meta{font-size:11px; color:var(--muted); margin-top:2px;}
  .doubt-dot{display:inline-block; width:6px;height:6px;border-radius:50%; background:var(--amber); margin-left:6px;}
  .entry-right{text-align:right; flex-shrink:0; display:flex; align-items:center;}
  .entry-amount{font-size:14px; font-weight:600;}
  .entry-del{background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:2px 4px; margin-left:6px;}

  .empty{text-align:center; padding:30px 10px; color:var(--muted); font-size:13px;}
  ::placeholder{color:#5C6266;}

  .view-tabs{display:flex; gap:8px; margin:14px 0;}
  .view-tabs button{
    flex:1; padding:9px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12.5px; cursor:pointer;
  }
  .view-tabs button.active{background:var(--panel-2); color:var(--amber); border-color:var(--amber);}

  .checkbox-row{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin:12px 0; cursor:pointer;}
  .checkbox-row input{width:auto; accent-color:var(--amber);}

  .year-nav{display:flex; align-items:center; justify-content:space-between; margin:0 0 12px;}
  .year-nav button{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    width:32px;height:32px;border-radius:6px; font-size:16px; cursor:pointer;
  }
  .year-label{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px;}

  .dash-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px;}
  .dash-card-title{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:12px;}

  .bar-chart{display:flex; align-items:flex-end; gap:6px; height:120px; margin-bottom:6px;}
  .bar-col{flex:1; display:flex; flex-direction:column-reverse; align-items:center; height:100%; gap:1px;}
  .bar-fill{width:100%; border-radius:3px 3px 0 0; min-height:2px;}
  .bar-fill.venta{background:var(--teal);}
  .bar-fill.compra{background:var(--rust);}
  .bar-labels{display:flex; gap:6px;}
  .bar-labels span{flex:1; text-align:center; font-size:9px; color:var(--muted); text-transform:capitalize;}

  .rank-row{margin-bottom:10px;}
  .rank-top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px;}
  .rank-top .cat{color:var(--text);}
  .rank-top .amt{color:var(--muted);}
  .rank-track{height:6px; background:var(--panel-2); border-radius:4px; overflow:hidden;}
  .rank-fill{height:100%; background:var(--amber); border-radius:4px;}

  .pend-banner{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:rgba(232,163,61,0.1); border:1px solid var(--amber); border-radius:10px;
    padding:12px 14px; margin-bottom:14px; font-size:12.5px;
  }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">

<script>
const MONTH_NAMES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const ALICUOTAS = [21, 10.5, 27, 0];
const TIPOS_COMPROBANTE = ['A','B','C','NC','SF'];
const TIPO_COMPROBANTE_LABEL = {A:'Factura A', B:'Factura B', C:'Factura C', NC:'Nota de crédito', SF:'Sin factura'};
const CATEGORIAS = {
  venta: [
    {n:'Asesoramiento', c:true},
    {n:'Control de plagas', c:true},
    {n:'Extracción de petróleo y gas', c:true},
    {n:'Otro', c:true}
  ],
  compra: [
    {n:'Casa', c:false},
    {n:'Alimento e higiene', c:false},
    {n:'Transporte', c:true},
    {n:'Bienestar', c:false},
    {n:'Educación', c:false},
    {n:'Otro', c:false}
  ]
};
function categoriaDefaultComputa(tipo, nombreCategoria){
  const cat = (CATEGORIAS[tipo] || []).find(c => c.n === nombreCategoria);
  return cat ? cat.c : true;
}
const emptyDraft = () => ({
  fecha: new Date().toISOString().slice(0,10),
  contraparte:'', cuit:'', numeroComprobante:'', tipoComprobante:'A',
  neto:'', alicuota:21, percepcionIVA:'', percepcionIIBB:'', otrosTributos:'', total:'',
  categoria:'', computaIVA:true, dudosos:[]
});

let state = {
  user: null,
  authChecking: true,
  authError: '',
  monthKey: currentMonthKey(),
  entries: [],
  formOpen: false,
  tipo: 'venta',
  loading: true,
  draft: emptyDraft(),
  view: 'mes', // 'mes' | 'dashboard'
  dashYear: new Date().getFullYear(),
  dashLoading: false,
  allMonths: {},
  upload: null // {thumb, status: 'analyzing'|'done'|'error', errorMsg}
};

function currentMonthKey(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0');
}
function shiftMonth(key, delta){
  const [y,m] = key.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0');
}
function fmtMoney(n){
  return '$' + n.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function apiFetch(url, options){
  const res = await fetch(url, options);
  if(res.status === 401){
    state.user = null;
    state.authError = '';
    render();
    throw new Error('sesión vencida');
  }
  return res;
}

async function loadMonth(key){
  state.loading = true;
  render();
  try{
    const res = await apiFetch('/api/entries?month=' + encodeURIComponent(key));
    const data = await res.json();
    state.entries = Array.isArray(data.entries) ? data.entries : [];
  }catch(e){
    if(e.message !== 'sesión vencida'){ console.error(e); state.entries = []; }
    return;
  }
  state.loading = false;
  render();
}
async function saveMonth(){
  try{
    await apiFetch('/api/entries', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ month: state.monthKey, entries: state.entries })
    });
  }catch(e){ if(e.message !== 'sesión vencida') console.error('Error guardando', e); }
}
function calcTotals(entries){
  let debito = 0, credito = 0, percepcionesIIBB = 0, percepcionesIVA = 0, otrosTributos = 0;
  entries.forEach(e => {
    const sign = e.tipoComprobante === 'NC' ? -1 : 1;
    const computa = e.computaIVA !== false; // por defecto true si no está definido
    if(computa){
      if(e.tipo === 'venta') debito += sign * e.iva;
      else credito += sign * e.iva;
      percepcionesIVA += sign * (e.percepcionIVA || 0);
    }
    percepcionesIIBB += sign * (e.percepcionIIBB || 0);
    otrosTributos += sign * (e.otrosTributos || 0);
  });
  // Percepciones de IVA sufridas como comprador se computan como pago a cuenta del IVA
  return {debito, credito, percepcionesIVA, percepcionesIIBB, otrosTributos, saldo: debito - credito - percepcionesIVA};
}

function montoFlujo(e){
  // Monto total del movimiento para el flujo de fondos por unidad (más allá de lo fiscal)
  const sign = e.tipoComprobante === 'NC' ? -1 : 1;
  return sign * (e.total || (e.neto + e.iva + (e.percepcionIVA||0) + (e.percepcionIIBB||0) + (e.otrosTributos||0)));
}

async function loadAllMonths(){
  try{
    const res = await apiFetch('/api/entries?all=1');
    const data = await res.json();
    return data.months || {};
  }catch(e){
    if(e.message !== 'sesión vencida') console.error(e);
    return {};
  }
}

async function loadDashboard(){
  state.dashLoading = true;
  render();
  state.allMonths = await loadAllMonths();
  state.dashLoading = false;
  render();
}

function resizeImage(file, maxDim = 900, quality = 0.7){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('No se pudo procesar la imagen'));
      img.onload = () => {
        let {width, height} = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        try{
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        }catch(e){
          reject(new Error('No se pudo comprimir la imagen'));
        }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

async function attachPhoto(file){
  try{
    const thumb = await resizeImage(file);
    state.upload = {thumb, status: 'analyzing'};
    state.formOpen = true;
    render();

    const base64 = await fileToBase64(file);
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ imageBase64: base64, mediaType: file.type || 'image/jpeg' })
    });
    const parsed = await response.json();

    if(!response.ok || parsed.error){
      throw new Error(parsed.error || 'No se pudo leer el comprobante');
    }

    state.tipo = parsed.tipo === 'compra' ? 'compra' : 'venta';
    const catValida = CATEGORIAS[state.tipo].some(c => c.n === parsed.categoria) ? parsed.categoria : '';
    state.draft = {
      fecha: parsed.fecha || emptyDraft().fecha,
      contraparte: parsed.contraparte || '',
      cuit: parsed.cuit || '',
      numeroComprobante: parsed.numeroComprobante || '',
      tipoComprobante: TIPOS_COMPROBANTE.includes(parsed.tipoComprobante) ? parsed.tipoComprobante : 'A',
      neto: parsed.neto ?? '',
      alicuota: parsed.alicuota ?? 21,
      percepcionIVA: parsed.percepcionIVA ?? '',
      percepcionIIBB: parsed.percepcionIIBB ?? '',
      otrosTributos: parsed.otrosTributos ?? '',
      total: parsed.total ?? '',
      categoria: catValida,
      computaIVA: catValida ? categoriaDefaultComputa(state.tipo, catValida) : true,
      dudosos: Array.isArray(parsed.dudosos) ? parsed.dudosos : []
    };
    state.upload.status = 'done';
  }catch(e){
    console.error(e);
    if(state.upload) state.upload.status = 'error';
    state.uploadError = e.message || 'No se pudo leer el comprobante. Completá los campos a mano.';
  }
  render();
}

function render(){
  const app = document.getElementById('app');

  if(state.authChecking){
    app.innerHTML = `<header><div class="eyebrow">Libro IVA</div><h1>Parciales mensuales</h1></header><div class="empty">Cargando...</div>`;
    return;
  }

  if(!state.user){
    app.innerHTML = `
      <header>
        <div class="eyebrow">Libro IVA</div>
        <h1>Parciales mensuales</h1>
      </header>
      <div class="dash-card" style="margin-top:20px;">
        <div class="dash-card-title">Iniciar sesión</div>
        <div class="field">
          <label>Usuario</label>
          <input type="text" id="f_username" autocapitalize="off" autocomplete="username">
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="f_password" autocomplete="current-password">
        </div>
        ${state.authError ? `<div style="font-size:12px; color:var(--rust); margin-bottom:10px;">${state.authError}</div>` : ''}
        <button class="save-btn" id="loginBtn">Entrar</button>
      </div>
    `;
    const doLogin = async () => {
      const username = document.getElementById('f_username').value;
      const password = document.getElementById('f_password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Entrando...';
      try{
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if(!res.ok){ state.authError = data.error || 'No se pudo iniciar sesión'; render(); return; }
        state.user = data.username;
        state.authError = '';
        render();
        loadMonth(state.monthKey);
      }catch(e){
        state.authError = 'Error de conexión. Probá de nuevo.';
        render();
      }
    };
    document.getElementById('loginBtn').onclick = doLogin;
    document.getElementById('f_password').addEventListener('keydown', ev => { if(ev.key === 'Enter') doLogin(); });
    return;
  }

  app.innerHTML = `
    <header style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <div class="eyebrow">Libro IVA</div>
        <h1>Parciales mensuales</h1>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px; color:var(--muted); margin-bottom:4px;">${state.user}</div>
        <button id="logoutBtn" style="background:none; border:1px solid var(--line); color:var(--muted); border-radius:6px; padding:4px 8px; font-size:11px; cursor:pointer; font-family:'IBM Plex Mono',monospace;">Salir</button>
      </div>
    </header>
    <div class="view-tabs">
      <button class="${state.view==='mes'?'active':''}" id="tabMes">Mes</button>
      <button class="${state.view==='dashboard'?'active':''}" id="tabDashboard">📊 Dashboard</button>
    </div>
    ${state.view === 'dashboard' ? renderDashboardHTML() : renderMesHTML()}
  `;
  document.getElementById('tabMes').onclick = () => { state.view = 'mes'; render(); };
  document.getElementById('tabDashboard').onclick = () => {
    state.view = 'dashboard';
    render();
    loadDashboard();
  };
  document.getElementById('logoutBtn').onclick = async () => {
    try{ await fetch('/api/logout', {method:'POST'}); }catch(e){}
    state.user = null;
    render();
  };

  if(state.view === 'mes') attachMesEvents();
  else attachDashboardEvents();
}

function renderMesHTML(){
  const [y,m] = state.monthKey.split('-').map(Number);
  const monthLabel = MONTH_NAMES[m-1] + ' ' + y;
  const t = calcTotals(state.entries);
  const isFavor = t.saldo <= 0;
  const debitoPct = (t.debito / (t.debito + t.credito || 1)) * 100;
  const sorted = [...state.entries].sort((a,b)=> (b.fecha||'').localeCompare(a.fecha||''));
  const d = state.draft;
  const isDoubt = (f) => d.dudosos.includes(f);
  const sf = d.tipoComprobante === 'SF';

  return `
    <div class="month-nav">
      <button id="prevMonth">‹</button>
      <div class="month-label">${monthLabel}</div>
      <button id="nextMonth">›</button>
    </div>

    <div class="saldo-panel">
      <div class="saldo-top">
        <div class="saldo-tag">Saldo IVA del mes</div>
        <div class="saldo-value ${isFavor ? 'favor' : 'pagar'}">${fmtMoney(Math.abs(t.saldo))}</div>
      </div>
      <div style="font-size:11.5px; color:var(--muted); margin-bottom:12px;">${isFavor ? 'A favor (crédito ≥ débito)' : 'A pagar (débito > crédito)'}</div>
      <div class="gauge">
        <div class="gauge-fill" style="left:0; width:${debitoPct}%; background:var(--teal);"></div>
        <div class="gauge-fill" style="right:0; width:${100-debitoPct}%; background:var(--rust);"></div>
        <div class="gauge-mid"></div>
      </div>
      <div class="gauge-labels">
        <span>Débito (ventas) ${fmtMoney(t.debito)}</span>
        <span>Crédito (compras) ${fmtMoney(t.credito)}</span>
      </div>
      <div class="subrow">
        <div>Percepciones IVA sufridas <span style="display:block;">(pago a cuenta del IVA)</span></div>
        <span>${fmtMoney(t.percepcionesIVA)}</span>
      </div>
      <div class="subrow">
        <div>Percepciones IIBB sufridas <span style="display:block;">(compensan contra IIBB, no IVA)</span></div>
        <span>${fmtMoney(t.percepcionesIIBB)}</span>
      </div>
    </div>

    <button class="add-toggle" id="toggleForm">${state.formOpen ? '– Cerrar' : '+ Cargar comprobante'}</button>

    <div class="form-panel ${state.formOpen ? 'open' : ''}" id="formPanel">
      <div class="tipo-toggle">
        <button data-tipo="venta" class="${state.tipo==='venta'?'active':''}">Venta</button>
        <button data-tipo="compra" class="${state.tipo==='compra'?'active':''}">Compra</button>
      </div>

      ${!state.upload ? `
        <div class="upload-area" id="uploadArea">
          <div class="icon">📷</div>
          <div class="label">Tocá para sacar foto o adjuntar el comprobante</div>
        </div>
        <div class="divider-or">o cargá los datos a mano</div>
      ` : `
        <div class="upload-thumb">
          <img src="${state.upload.thumb}">
          <div class="status ${state.upload.status}">
            ${state.upload.status==='analyzing' ? '<span class="spinner"></span>Leyendo comprobante...' : ''}
            ${state.upload.status==='done' ? 'Listo — revisá y confirmá los campos' : ''}
            ${state.upload.status==='error' ? (state.uploadError || 'No se pudo leer, completá a mano') : ''}
          </div>
          <button id="retakePhoto">✕</button>
        </div>
      `}

      <div class="row2">
        <div class="field ${isDoubt('tipoComprobante')?'doubt':''}">
          <label>Tipo comprobante ${isDoubt('tipoComprobante')?'<span class="doubt-flag">●</span>':''}</label>
          <select id="f_tipoComprobante">
            ${TIPOS_COMPROBANTE.map(t => `<option value="${t}" ${t===d.tipoComprobante?'selected':''}>${TIPO_COMPROBANTE_LABEL[t]}</option>`).join('')}
          </select>
        </div>
        <div class="field ${isDoubt('numeroComprobante')?'doubt':''}">
          <label>N° comprobante ${isDoubt('numeroComprobante')?'<span class="doubt-flag">●</span>':''}</label>
          <input type="text" id="f_numeroComprobante" placeholder="0001-00001234" value="${d.numeroComprobante}" ${sf?'disabled':''}>
        </div>
      </div>
      <div class="field ${isDoubt('fecha')?'doubt':''}">
        <label>Fecha ${isDoubt('fecha')?'<span class="doubt-flag">● a confirmar</span>':''}</label>
        <input type="date" id="f_fecha" value="${d.fecha}">
      </div>
      <div class="field ${isDoubt('contraparte')?'doubt':''}">
        <label>${state.tipo === 'venta' ? 'Cliente' : 'Proveedor'} ${isDoubt('contraparte')?'<span class="doubt-flag">● a confirmar</span>':''}</label>
        <input type="text" id="f_contraparte" placeholder="Ej: Empresa SRL" value="${d.contraparte}">
      </div>
      ${!sf ? `
      <div class="field ${isDoubt('cuit')?'doubt':''}">
        <label>CUIT ${isDoubt('cuit')?'<span class="doubt-flag">●</span>':''}</label>
        <input type="text" id="f_cuit" placeholder="20-12345678-9" value="${d.cuit}">
      </div>` : ''}
      <div class="field ${isDoubt('categoria')?'doubt':''}">
        <label>Categoría ${isDoubt('categoria')?'<span class="doubt-flag">●</span>':''}</label>
        <select id="f_categoria">
          <option value="">— Elegir —</option>
          ${CATEGORIAS[state.tipo].map(c => `<option value="${c.n}" ${c.n===d.categoria?'selected':''}>${c.n}</option>`).join('')}
        </select>
      </div>
      <div class="row2">
        <div class="field ${isDoubt('neto')?'doubt':''}">
          <label>${sf ? 'Monto' : 'Neto gravado'} ${isDoubt('neto')?'<span class="doubt-flag">●</span>':''}</label>
          <input type="number" step="0.01" id="f_neto" placeholder="0.00" value="${d.neto}">
        </div>
        ${!sf ? `
        <div class="field ${isDoubt('alicuota')?'doubt':''}">
          <label>Alícuota ${isDoubt('alicuota')?'<span class="doubt-flag">●</span>':''}</label>
          <select id="f_alicuota">
            ${ALICUOTAS.map(a => `<option value="${a}" ${a==d.alicuota?'selected':''}>${a}%</option>`).join('')}
          </select>
        </div>` : ''}
      </div>
      ${!sf ? `
      <div class="row2">
        <div class="field ${isDoubt('percepcionIVA')?'doubt':''}">
          <label>Percepción IVA ${isDoubt('percepcionIVA')?'<span class="doubt-flag">●</span>':''}</label>
          <input type="number" step="0.01" id="f_percepcionIVA" placeholder="0.00" value="${d.percepcionIVA}">
        </div>
        <div class="field ${isDoubt('percepcionIIBB')?'doubt':''}">
          <label>Percepción IIBB ${isDoubt('percepcionIIBB')?'<span class="doubt-flag">●</span>':''}</label>
          <input type="number" step="0.01" id="f_percepcionIIBB" placeholder="0.00" value="${d.percepcionIIBB}">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Otros tributos</label>
          <input type="number" step="0.01" id="f_otrosTributos" placeholder="0.00" value="${d.otrosTributos}">
        </div>
        <div class="field ${isDoubt('total')?'doubt':''}">
          <label>Total comprobante ${isDoubt('total')?'<span class="doubt-flag">●</span>':''}</label>
          <input type="number" step="0.01" id="f_total" placeholder="0.00" value="${d.total}">
        </div>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="f_computaIVA" ${d.computaIVA ? 'checked' : ''}>
        <span>Computa crédito/débito fiscal de IVA (afecta el saldo)</span>
      </label>
      ${(() => {
        const neto = parseFloat(d.neto)||0, alicuota = d.alicuota, total = parseFloat(d.total)||0;
        if(!total) return '';
        const ivaCalc = Math.round(neto * alicuota) / 100;
        const esperado = neto + ivaCalc + (parseFloat(d.percepcionIVA)||0) + (parseFloat(d.percepcionIIBB)||0) + (parseFloat(d.otrosTributos)||0);
        const diff = Math.abs(esperado - total);
        if(diff > 1){
          return `<div style="font-size:11.5px; color:var(--rust); background:rgba(217,99,75,0.1); border:1px solid var(--rust); border-radius:8px; padding:8px 10px; margin:10px 0;">⚠ Los campos no cierran contra el total: calculado ${fmtMoney(esperado)} vs. total ${fmtMoney(total)}. Revisá antes de guardar.</div>`;
        }
        return `<div style="font-size:11.5px; color:var(--teal); margin:10px 0;">✓ Cierra contra el total</div>`;
      })()}
      ` : `
      <div style="font-size:11.5px; color:var(--muted); margin:10px 0; line-height:1.5;">Sin factura: no genera crédito/débito fiscal de IVA. Se registra igual en el flujo de fondos por categoría.</div>
      `}

      <button class="save-btn" id="saveEntry" ${state.upload && state.upload.status==='analyzing' ? 'disabled' : ''}>Confirmar y guardar</button>
      <button class="cancel-btn" id="cancelEntry">Cancelar</button>
    </div>

    <div class="section-title">Comprobantes del mes (${state.entries.length})</div>
    ${state.loading ? '<div class="empty">Cargando...</div>' : (sorted.length === 0 ? '<div class="empty">Todavía no cargaste comprobantes este mes.</div>' : sorted.map(e => `
      <div class="entry">
        <div class="entry-left">
          <div class="tipo-dot ${e.tipo}"></div>
          ${e.foto ? `<img src="${e.foto}" style="width:32px;height:32px;object-fit:cover;border-radius:6px;flex-shrink:0;">` : ''}
          <div class="entry-info">
            <div class="entry-name">${e.contraparte || '(sin nombre)'}${e.dudoso ? '<span class="doubt-dot"></span>' : ''}</div>
            <div class="entry-meta">${e.fecha} · ${TIPO_COMPROBANTE_LABEL[e.tipoComprobante] || 'Factura A'}${e.tipoComprobante!=='SF' ? ' · ' + e.alicuota + '%' : ''} · ${fmtMoney(e.neto)}${e.categoria ? ' · ' + e.categoria : ''}${e.computaIVA===false ? ' · sin crédito fiscal' : ''}${e.cargadoPor ? ' · cargó ' + e.cargadoPor : ''}</div>
          </div>
        </div>
        <div class="entry-right">
          <div>
            <div class="entry-amount">${e.tipoComprobante==='SF' ? fmtMoney(e.neto) : 'IVA ' + fmtMoney(e.iva)}</div>
            ${e.percepcionIVA ? `<div class="entry-meta">perc. IVA ${fmtMoney(e.percepcionIVA)}</div>` : ''}
            ${e.percepcionIIBB ? `<div class="entry-meta">perc. IIBB ${fmtMoney(e.percepcionIIBB)}</div>` : ''}
          </div>
          <button class="entry-del" data-id="${e.id}">✕</button>
        </div>
      </div>
    `).join(''))}
  `;
}

function renderDashboardHTML(){
  if(state.dashLoading){
    return '<div class="empty">Cargando resumen...</div>';
  }
  const allMonths = state.allMonths || {};
  const year = state.dashYear;
  const monthKeysOfYear = MONTH_NAMES.map((_,i) => year + '-' + String(i+1).padStart(2,'0'));
  const entriesOfYear = monthKeysOfYear.flatMap(k => allMonths[k] || []);

  const t = calcTotals(entriesOfYear);
  const isFavor = t.saldo <= 0;

  // Gasto/facturado por mes (flujo de fondos completo, no solo lo fiscal)
  const monthly = monthKeysOfYear.map(k => {
    const es = allMonths[k] || [];
    let venta = 0, compra = 0;
    es.forEach(e => { if(e.tipo === 'venta') venta += montoFlujo(e); else compra += montoFlujo(e); });
    return {venta, compra};
  });
  const maxMonthly = Math.max(1, ...monthly.map(m => Math.max(m.venta, m.compra)));

  // Ranking por categoría (todas las entradas del año, negocio + vida)
  const porCategoria = {};
  entriesOfYear.forEach(e => {
    const cat = e.categoria || 'Sin categoría';
    porCategoria[cat] = (porCategoria[cat] || 0) + montoFlujo(e);
  });
  const ranking = Object.entries(porCategoria).sort((a,b) => b[1]-a[1]);
  const maxCat = Math.max(1, ...ranking.map(r => r[1]));

  // Pendientes: comprobantes dudosos en todo el histórico
  const pendientes = Object.values(allMonths).flat().filter(e => e.dudoso).length;

  const years = Array.from(new Set(Object.keys(allMonths).map(k => parseInt(k.slice(0,4))))).sort();
  if(!years.includes(year)) years.push(year);

  return `
    <div class="year-nav">
      <button id="prevYear">‹</button>
      <div class="year-label">${year}</div>
      <button id="nextYear">›</button>
    </div>

    ${pendientes > 0 ? `
    <div class="pend-banner">
      <span>⚠ Tenés ${pendientes} comprobante${pendientes>1?'s':''} marcado${pendientes>1?'s':''} como dudoso${pendientes>1?'s':''} para revisar</span>
    </div>` : ''}

    <div class="dash-card">
      <div class="dash-card-title">Fiscal · saldo IVA ${year}</div>
      <div class="saldo-top">
        <div class="saldo-tag">Acumulado</div>
        <div class="saldo-value ${isFavor ? 'favor' : 'pagar'}" style="font-size:24px;">${fmtMoney(Math.abs(t.saldo))}</div>
      </div>
      <div style="font-size:11.5px; color:var(--muted); margin-bottom:10px;">${isFavor ? 'A favor' : 'A pagar'}</div>
      <div class="subrow" style="margin-top:0; padding-top:10px;">
        <div>Débito (ventas)</div><span>${fmtMoney(t.debito)}</span>
      </div>
      <div class="subrow">
        <div>Crédito (compras)</div><span>${fmtMoney(t.credito)}</span>
      </div>
      <div class="subrow">
        <div>Percepciones IVA (pago a cuenta)</div><span>${fmtMoney(t.percepcionesIVA)}</span>
      </div>
      <div class="subrow">
        <div>Percepciones IIBB acumuladas</div><span>${fmtMoney(t.percepcionesIIBB)}</span>
      </div>
    </div>

    <div class="dash-card">
      <div class="dash-card-title">Facturado vs. gastado por mes</div>
      <div class="bar-chart">
        ${monthly.map(m => `
          <div class="bar-col">
            <div class="bar-fill venta" style="height:${(m.venta/maxMonthly*100)}%" title="Facturado: ${fmtMoney(m.venta)}"></div>
            <div class="bar-fill compra" style="height:${(m.compra/maxMonthly*100)}%" title="Gastado: ${fmtMoney(m.compra)}"></div>
          </div>
        `).join('')}
      </div>
      <div class="bar-labels">
        ${MONTH_NAMES.map(n => `<span>${n.slice(0,3)}</span>`).join('')}
      </div>
      <div class="gauge-labels" style="margin-top:10px;">
        <span><span style="color:var(--teal);">●</span> Facturado</span>
        <span><span style="color:var(--rust);">●</span> Gastado</span>
      </div>
    </div>

    <div class="dash-card">
      <div class="dash-card-title">Por categoría · ${year} (todo: negocio y vida)</div>
      ${ranking.length === 0 ? '<div class="empty">Todavía no hay comprobantes cargados en este año.</div>' : ranking.map(([cat, monto]) => `
        <div class="rank-row">
          <div class="rank-top"><span class="cat">${cat}</span><span class="amt">${fmtMoney(Math.abs(monto))}</span></div>
          <div class="rank-track"><div class="rank-fill" style="width:${(Math.abs(monto)/maxCat*100)}%"></div></div>
        </div>
      `).join('')}
    </div>
  `;
}

function readDraftFromForm(){
  const val = (id, fallback='') => { const el = document.getElementById(id); return el ? el.value : fallback; };
  const sf = val('f_tipoComprobante') === 'SF';
  state.draft = {
    fecha: val('f_fecha'),
    contraparte: val('f_contraparte'),
    cuit: sf ? '' : val('f_cuit'),
    numeroComprobante: sf ? '' : val('f_numeroComprobante'),
    tipoComprobante: val('f_tipoComprobante', 'A'),
    neto: val('f_neto'),
    alicuota: sf ? 0 : parseFloat(val('f_alicuota', '21')),
    percepcionIVA: sf ? '' : val('f_percepcionIVA'),
    percepcionIIBB: sf ? '' : val('f_percepcionIIBB'),
    otrosTributos: sf ? '' : val('f_otrosTributos'),
    total: sf ? '' : val('f_total'),
    categoria: val('f_categoria'),
    computaIVA: sf ? false : (document.getElementById('f_computaIVA') ? document.getElementById('f_computaIVA').checked : true),
    dudosos: state.draft.dudosos
  };
}

function attachDashboardEvents(){
  const prevYear = document.getElementById('prevYear');
  const nextYear = document.getElementById('nextYear');
  if(prevYear) prevYear.onclick = () => { state.dashYear--; render(); };
  if(nextYear) nextYear.onclick = () => { state.dashYear++; render(); };
}

function attachMesEvents(){
  document.getElementById('prevMonth').onclick = () => { state.monthKey = shiftMonth(state.monthKey, -1); loadMonth(state.monthKey); };
  document.getElementById('nextMonth').onclick = () => { state.monthKey = shiftMonth(state.monthKey, 1); loadMonth(state.monthKey); };

  document.getElementById('toggleForm').onclick = () => {
    state.formOpen = !state.formOpen;
    if(!state.formOpen){ state.upload = null; state.draft = emptyDraft(); }
    render();
  };

  const cancelBtn = document.getElementById('cancelEntry');
  if(cancelBtn) cancelBtn.onclick = () => { state.formOpen = false; state.upload = null; state.draft = emptyDraft(); render(); };

  document.querySelectorAll('.tipo-toggle button').forEach(btn => {
    btn.onclick = () => {
      if(document.getElementById('f_fecha')) readDraftFromForm();
      state.tipo = btn.dataset.tipo;
      if(!CATEGORIAS[state.tipo].some(c => c.n === state.draft.categoria)) state.draft.categoria = '';
      state.formOpen = true;
      render();
    };
  });

  const uploadArea = document.getElementById('uploadArea');
  if(uploadArea) uploadArea.onclick = () => document.getElementById('fileInput').click();

  const tipoComprobanteSel = document.getElementById('f_tipoComprobante');
  if(tipoComprobanteSel) tipoComprobanteSel.addEventListener('change', () => { readDraftFromForm(); render(); });

  const categoriaSel = document.getElementById('f_categoria');
  if(categoriaSel) categoriaSel.addEventListener('change', () => {
    readDraftFromForm();
    if(state.draft.categoria) state.draft.computaIVA = categoriaDefaultComputa(state.tipo, state.draft.categoria);
    render();
  });

  ['f_neto','f_alicuota','f_percepcionIVA','f_percepcionIIBB','f_otrosTributos','f_total','f_computaIVA'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('change', () => { readDraftFromForm(); render(); });
  });

  const retake = document.getElementById('retakePhoto');
  if(retake) retake.onclick = () => { state.upload = null; state.draft = emptyDraft(); render(); };

  const saveBtn = document.getElementById('saveEntry');
  if(saveBtn) saveBtn.onclick = async () => {
    readDraftFromForm();
    const neto = parseFloat(state.draft.neto) || 0;
    const sf = state.draft.tipoComprobante === 'SF';
    const alicuota = sf ? 0 : state.draft.alicuota;
    const percepcionIVA = sf ? 0 : (parseFloat(state.draft.percepcionIVA) || 0);
    const percepcionIIBB = sf ? 0 : (parseFloat(state.draft.percepcionIIBB) || 0);
    const otrosTributos = sf ? 0 : (parseFloat(state.draft.otrosTributos) || 0);
    const total = sf ? 0 : (parseFloat(state.draft.total) || 0);
    const contraparte = state.draft.contraparte.trim();
    const fecha = state.draft.fecha;

    if(neto <= 0){ alert(sf ? 'Ingresá el monto.' : 'Ingresá el neto gravado.'); return; }
    if(!state.draft.categoria){ alert('Elegí una categoría.'); return; }

    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      tipo: state.tipo,
      tipoComprobante: state.draft.tipoComprobante,
      numeroComprobante: state.draft.numeroComprobante.trim(),
      cuit: state.draft.cuit.trim(),
      categoria: state.draft.categoria,
      fecha, contraparte, neto, alicuota,
      iva: sf ? 0 : Math.round(neto * alicuota) / 100,
      percepcionIVA, percepcionIIBB, otrosTributos, total,
      computaIVA: sf ? false : state.draft.computaIVA,
      dudoso: state.draft.dudosos.length > 0,
      foto: state.upload ? state.upload.thumb : null,
      cargadoPor: state.user
    };
    state.entries.push(entry);
    saveBtn.disabled = true;
    saveBtn.textContent = 'Guardando...';
    await saveMonth();
    state.formOpen = false;
    state.upload = null;
    state.draft = emptyDraft();
    render();
  };

  document.querySelectorAll('.entry-del').forEach(btn => {
    btn.onclick = async () => {
      state.entries = state.entries.filter(e => e.id !== btn.dataset.id);
      await saveMonth();
      render();
    };
  });
}

document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(file) attachPhoto(file);
  e.target.value = '';
});

async function init(){
  try{
    const res = await fetch('/api/me');
    if(res.ok){
      const data = await res.json();
      state.user = data.username;
    }
  }catch(e){ /* sin sesión */ }
  state.authChecking = false;
  render();
  if(state.user) loadMonth(state.monthKey);
}
init();
</script>
</body>
</html>
